name: Deploy Proof Procure to Cloudflare

on:
  push:
    branches:
      - main
      - codex/procurement-demo-state
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Build OpenNext bundle
        working-directory: web
        run: npm run build:cf

      - name: Apply D1 schema
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute proof-procure-db --remote --file ../infra/schema.sql

      - name: Check D1 onboarding columns
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute proof-procure-db --remote --command "PRAGMA table_info(businesses);" | tee /tmp/businesses-schema.txt
          grep -q "industry_type" /tmp/businesses-schema.txt
          grep -q "product_categories" /tmp/businesses-schema.txt
          grep -q "payment_method" /tmp/businesses-schema.txt

      - name: Deploy web worker
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --keep-vars

      - name: Install keeper dependencies
        working-directory: workers/keeper
        run: npm ci

      - name: Deploy keeper worker
        working-directory: workers/keeper
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --keep-vars

      - name: Smoke Arc health
        run: |
          node -e "fetch('https://proof-procure.peppera.workers.dev/api/arc/chain').then(r=>r.json()).then(j=>{ if (!j.ok) throw new Error(JSON.stringify(j)); console.log(j); })"
