name = "proof-procure"
main = ".open-next/worker.js"
compatibility_date = "2026-04-19"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "proof-procure"

[[d1_databases]]
binding = "DB"
database_name = "proof-procure-db"
database_id = "a6e45af5-39b1-45ed-bd4b-23752f35ef85"

[[send_email]]
name = "EMAIL"
remote = true

[vars]
ARC_RPC_URL = "https://mainnet.base.org"
RESEND_FROM = "onboarding@resend.dev"
FACTORY_CONTRACT_ADDRESS = "0x84a52e5bb4831d1171cc870f3621cf376fe50933"
USDC_CONTRACT_ADDRESS = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
